name: SkyUrban CI/CD Pipeline

on:
  push:
    branches: ["master"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: skyurban_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, mysql, bcmath
          coverage: none

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Instalar dependencias Backend
        run: |
          cp .env.example .env
          composer install --no-interaction --prefer-dist

      - name: Instalar y Compilar Frontend en GitHub
        run: |
          npm install
          npm run build

      - name: Validar Base de Datos
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skyurban_db
          DB_USERNAME: root
          DB_PASSWORD: ""

      # Despliegue automático en Hostinger vía SSH
      - name: 1. Actualizar código Laravel en Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          passphrase: ${{ secrets.HOSTINGER_PASSPHRASE }}
          script: |
            cd domains/skyurban.space/public_html
            git pull origin master
            composer install --no-dev --optimize-autoloader --no-interaction

      - name: 2. Transferir diseño compilado de Vue (public/build) a Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          passphrase: ${{ secrets.HOSTINGER_PASSPHRASE }}
          source: "public/build"
          target: "domains/skyurban.space/public_html"

      - name: 3. Ejecutar optimizaciones finales y enlaces de almacenamiento
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          passphrase: ${{ secrets.HOSTINGER_PASSPHRASE }}
          script: |
            cd domains/skyurban.space/public_html

            php artisan storage:link --force || true

            if [ ! -d "public/storage" ]; then
              cp -r storage/app/public public/storage || true
            fi

            php artisan migrate --force

            php artisan config:cache
            php artisan route:cache
            php artisan view:clear
