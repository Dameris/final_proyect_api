name: SkyUrban CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  laravel-vue-tests:
    runs-on: ubuntu-latest

    # Definimos los servicios
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: skyurban_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Coder Checkouout
        uses: actions/checkout@v4

      - name: Configurar entorno PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, mysql, bcmath
          coverage: none

      - name: Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Copiar archivo de entorno de pruebas
        run: cp .env.example .env

      - name: Instalar dependencias del Backend (Composer)
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generar clave de aplicación Laravel
        run: php artisan key:generate

      - name: Instalar dependencias del Frontend (NPM)
        run: npm install

      - name: Compilar Frontend (Producción)
        run: npm run build

      - name: Verificar conexión y levantar Base de Datos
        run: |
          php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skyurban_db
          DB_USERNAME: root
          DB_PASSWORD: ""

      - name: Verificación de estado de la aplicación
        run: |
          echo "¡El pipeline se ha ejecutado con éxito!"
          echo "Backend de Laravel verificado, Frontend de Vue compilado y Base de Datos MySQL sincronizada."
